name: sweetbonb-tg-bot
region: sgp

services:
  - name: bot
    github:
      repo: ericwong224/SweetBonb-tgbot
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: node dist/index.js
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    envs:
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      - key: BOT_MODE
        value: demo
        scope: RUN_TIME
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
        scope: RUN_TIME
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DEEPSEEK_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: WEBHOOK_BASE_URL
        value: https://sweetbonb-tg-bot-ege7y.ondigitalocean.app
        scope: RUN_TIME
      - key: TEST_MESSAGE_ACK
        value: "false"
        scope: RUN_TIME

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
